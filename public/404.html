      if (typeof Fuse !== 'undefined'){
        fuse = new Fuse(d, {
          keys: [{name:'title',weight:2},{name:'content'},{name:'tags'},{name:'categories'}],
          threshold: 0.3,
          ignoreLocation: true
        });
      }
    }).catch(function(){});
  }

  
  function doSearch(q){
    if (!q || !data) { resultsEl.innerHTML = ''; return; }
    var matches;
    if (fuse) {
      matches = fuse.search(q).slice(0,10);
    } else {
      var lower = q.toLowerCase();
      matches = data.filter(function(item){
        return (item.title && item.title.toLowerCase().indexOf(lower) !== -1) ||
               (item.content && item.content.toLowerCase().indexOf(lower) !== -1);
      }).slice(0,10).map(function(item){ return {item:item}; });
    }
    if (matches.length === 0) {
      resultsEl.innerHTML = '<p class="text-page-muted text-center py-8">未找到相关结果</p>';
      return;
    }
    var html = '';
    for (var i=0; i<matches.length; i++){
      var item = matches[i].item || matches[i];
      html += '<a href="'+(item.permalink||'#')+'" class="block p-3 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 transition-colors">'
            + '<div class="font-semibold text-accent">'+(item.title||'')+'</div>'
            + '<div class="text-sm text-page-muted mt-1 line-clamp-2">'+(item.summary||'')+'</div>'
            + '</a>';
    }
    resultsEl.innerHTML = html;
  }

  if (input) {
    
    var fuseScript = document.createElement('script');
    fuseScript.src = 'https://cdn.bootcdn.net/ajax/libs/fuse.js/7.0.0/fuse.min.js';
    fuseScript.onload = function(){ loadIndex(); };
    document.head.appendChild(fuseScript);

    input.addEventListener('input', function(){
      clearTimeout(input._timer);
      input._timer = setTimeout(function(){ doSearch(input.value.trim()); }, 200);
    });
    input.addEventListener('focus', function(){ loadIndex(); });
  }
})();
</script>
 

    <script>
      (function () {
        var html = document.documentElement;

        
        var picker = document.getElementById("theme-picker-panel");
        var pickerBtn = document.getElementById("theme-picker-btn");
        if (pickerBtn && picker) {
          pickerBtn.onclick = function (e) {
            e.stopPropagation();
            picker.classList.toggle("open");
          };
          document.addEventListener("click", function (e) {
            if (!e.target.closest(".theme-picker"))
              picker.classList.remove("open");
          });
        }
        function applyTheme(t) {
          html.setAttribute("data-theme", t);
          localStorage.setItem("macaron-theme", t);
          var opts = document.querySelectorAll(".theme-option");
          for (var i = 0; i < opts.length; i++) {
            if (opts[i].dataset.theme === t) opts[i].classList.add("active");
            else opts[i].classList.remove("active");
          }
        }
        var themeOpts = document.querySelectorAll(".theme-option");
        for (var i = 0; i < themeOpts.length; i++) {
          (function (opt) {
            opt.onclick = function () {
              applyTheme(opt.dataset.theme);
            };
          })(themeOpts[i]);
        }
        applyTheme(localStorage.getItem("macaron-theme") || "blueberry-peach");

        
        var saved = localStorage.getItem("appearance");
        if (
          saved === "dark" ||
          (!saved && window.matchMedia("(prefers-color-scheme:dark)").matches)
        ) {
          html.classList.add("dark");
        }
        function toggleDark() {
          html.classList.toggle("dark");
          localStorage.setItem(
            "appearance",
            html.classList.contains("dark") ? "dark" : "light",
          );
        }
        var btn1 = document.getElementById("appearance-switcher");
        var btn2 = document.getElementById("appearance-switcher-mobile");
        if (btn1) btn1.onclick = toggleDark;
        if (btn2) btn2.onclick = toggleDark;

        
        var menuToggle = document.getElementById("mobile-menu-toggle");
        var mobileMenu = document.getElementById("mobile-menu");
        var menuIconOpen = document.getElementById("menu-icon-open");
        var menuIconClose = document.getElementById("menu-icon-close");
        
        function closeMobileMenu() {
          if (!mobileMenu) return;
          mobileMenu.classList.remove("menu-visible");
          mobileMenu.classList.add("menu-hidden");
          if (menuIconOpen) menuIconOpen.classList.remove("hidden");
          if (menuIconClose) menuIconClose.classList.add("hidden");
          setTimeout(function(){ mobileMenu.classList.add("hidden"); }, 250);
        }
        function openMobileMenu() {
          if (!mobileMenu) return;
          mobileMenu.classList.remove("hidden", "menu-hidden");
          mobileMenu.classList.add("menu-visible");
          if (menuIconOpen) menuIconOpen.classList.add("hidden");
          if (menuIconClose) menuIconClose.classList.remove("hidden");
        }
        if (menuToggle && mobileMenu) {
          menuToggle.onclick = function (e) {
            e.stopPropagation();
            if (mobileMenu.classList.contains("hidden") || mobileMenu.classList.contains("menu-hidden")) {
              openMobileMenu();
            } else {
              closeMobileMenu();
            }
          };
        }
        
        document.addEventListener("click", function (e) {
          if (mobileMenu && !mobileMenu.classList.contains("hidden") && 
              !e.target.closest("#mobile-menu") && !e.target.closest("#mobile-menu-toggle")) {
            closeMobileMenu();
          }
        });

        
        var ddWrap = document.getElementById("nav-dropdown-wrap");
        var ddBtn = document.getElementById("nav-dropdown-btn");
        var ddMenu = document.getElementById("nav-dropdown");
        var ddArrow = document.getElementById("nav-dropdown-arrow");
        
        function openDropdown() {
          if (!ddMenu) return;
          ddMenu.classList.remove("hidden", "dropdown-hidden");
          ddMenu.classList.add("dropdown-visible");
          if (ddArrow) ddArrow.style.transform = "rotate(180deg)";
        }
        function closeDropdown() {
          if (!ddMenu) return;
          ddMenu.classList.remove("dropdown-visible");
          ddMenu.classList.add("dropdown-hidden");
          if (ddArrow) ddArrow.style.transform = "";
          setTimeout(function(){ 
            if (ddMenu.classList.contains("dropdown-hidden")) {
              ddMenu.classList.add("hidden"); 
            }
          }, 200);
        }
        
        if (ddWrap && ddMenu) {
          
          ddWrap.addEventListener("mouseenter", function(){
            clearTimeout(ddWrap._closeTimer);
            openDropdown();
          });
          ddWrap.addEventListener("mouseleave", function(){
            ddWrap._closeTimer = setTimeout(closeDropdown, 150);
          });
          
          ddBtn && ddBtn.addEventListener("click", function(e){
            e.stopPropagation();
            if (ddMenu.classList.contains("hidden") || ddMenu.classList.contains("dropdown-hidden")) {
              openDropdown();
            } else {
              closeDropdown();
            }
          });
        }
        
        document.addEventListener("click", function (e) {
          if (!e.target.closest("#nav-dropdown-wrap")) {
            closeDropdown();
          }
        });

        
        function openSearch() {
          var w = document.getElementById("search-wrapper");
          var inp = document.getElementById("search-query");
          if (w) {
            w.classList.remove("invisible");
            if (inp)
              setTimeout(function () {
                inp.focus();
              }, 100);
          }
        }
        var searchBtn = document.getElementById("search-button");
        var searchBtnMobile = document.getElementById("search-button-mobile");
        var searchWrapper = document.getElementById("search-wrapper");
        var closeSearchBtn = document.getElementById("close-search-button");
        if (searchBtn) searchBtn.onclick = openSearch;
        if (searchBtnMobile) searchBtnMobile.onclick = openSearch;
        if (closeSearchBtn && searchWrapper) {
          closeSearchBtn.onclick = function () {
            searchWrapper.classList.add("invisible");
          };
        }
        if (searchWrapper) {
          searchWrapper.onclick = function (e) {
            if (e.target === searchWrapper)
              searchWrapper.classList.add("invisible");
          };
        }
        document.addEventListener("keydown", function (e) {
          if (
            e.key === "Escape" &&
            searchWrapper &&
            !searchWrapper.classList.contains("invisible")
          ) {
            searchWrapper.classList.add("invisible");
          }
        });

        
        var lastScrollForMenu = 0;
        var mouseOverHeader = false;
        var headerEl = document.querySelector(".macaron-header");
        if (headerEl) {
          headerEl.addEventListener("mouseenter", function(){ mouseOverHeader = true; });
          headerEl.addEventListener("mouseleave", function(){ mouseOverHeader = false; });
        }
        window.addEventListener(
          "scroll",
          function () {
            if (mouseOverHeader) return; 
            var diff = Math.abs(window.scrollY - lastScrollForMenu);
            if (diff > 50) {
              closeDropdown();
              if (picker) picker.classList.remove("open");
              closeMobileMenu();
              lastScrollForMenu = window.scrollY;
            }
          },
          { passive: true }
        );

        
        var scrollBtn = document.getElementById("scroll-top-btn");
        if (scrollBtn) {
          window.addEventListener(
            "scroll",
            function () {
              if (window.scrollY > 400) scrollBtn.classList.add("visible");
              else scrollBtn.classList.remove("visible");
            },
            { passive: true },
          );
          scrollBtn.onclick = function () {
            window.scrollTo({ top: 0, behavior: "smooth" });
          };
        }

        
        var header = document.querySelector(".macaron-header");
        if (header) {
          var lastScroll = 0;
          var ticking = false;
          header.addEventListener("mouseenter", function(){ mouseOverHeader = true; });
          header.addEventListener("mouseleave", function(){ mouseOverHeader = false; });
          window.addEventListener(
            "scroll",
            function () {
              if (!ticking) {
                window.requestAnimationFrame(function () {
                  var cur = window.scrollY;
                  
                  if (cur < 60) {
                    header.classList.remove("header-hidden", "header-shadow");
                  } else {
                    
                    header.classList.add("header-shadow");
                    
                    if (mouseOverHeader) {
                      header.classList.remove("header-hidden");
                    } else {
                      
                      if (cur > lastScroll + 8) {
                        header.classList.add("header-hidden");
                      } else if (cur < lastScroll - 8) {
                        header.classList.remove("header-hidden");
                      }
                    }
                  }
                  lastScroll = cur;
                  ticking = false;
                });
                ticking = true;
              }
            },
            { passive: true },
          );
        }
      })();
    </script>
  </body>
</html>
