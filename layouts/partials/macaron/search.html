<!-- 搜索模态框 -->
<div id="search-wrapper" class="invisible fixed inset-0 flex items-start justify-center pt-[15vh] z-[999]"
     style="background:rgba(0,0,0,.3); backdrop-filter:blur(8px);">
  <div id="search-modal" class="w-full max-w-2xl mx-4 rounded-2xl overflow-hidden frosted-glass">
    <div class="p-4">
      <div class="flex items-center gap-3">
        <svg class="h-5 w-5 flex-shrink-0 text-page-muted" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input type="search" id="search-query" 
               class="flex-grow bg-transparent outline-none text-lg text-page placeholder:text-page-muted"
               placeholder="搜索文章..." autocomplete="off">
        <button type="button" id="close-search-button" 
                class="p-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors cursor-pointer text-page-muted">
          <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
    </div>
    <div id="search-results" class="max-h-[50vh] overflow-y-auto px-4 pb-4"></div>
  </div>
</div>

<script>
(function(){
  var input = document.getElementById('search-query');
  var resultsEl = document.getElementById('search-results');
  var data = null;
  var fuse = null;

  // 加载搜索索引
  function loadIndex(){
    if (data) return Promise.resolve();
    return fetch('/index.json').then(function(r){ return r.json(); }).then(function(d){
      data = d;
      if (typeof Fuse !== 'undefined'){
        fuse = new Fuse(d, {
          keys: [{name:'title',weight:2},{name:'content'},{name:'tags'},{name:'categories'}],
          threshold: 0.3,
          ignoreLocation: true
        });
      }
    }).catch(function(){});
  }

  // 执行搜索
  function doSearch(q){
    if (!q || !data) { resultsEl.innerHTML = ''; return; }
    var matches;
    if (fuse) {
      matches = fuse.search(q).slice(0,10);
    } else {
      var lower = q.toLowerCase();
      matches = data.filter(function(item){
        return (item.title && item.title.toLowerCase().indexOf(lower) !== -1) ||
               (item.content && item.content.toLowerCase().indexOf(lower) !== -1);
      }).slice(0,10).map(function(item){ return {item:item}; });
    }
    if (matches.length === 0) {
      resultsEl.innerHTML = '<p class="text-page-muted text-center py-8">未找到相关结果</p>';
      return;
    }
    var html = '';
    for (var i=0; i<matches.length; i++){
      var item = matches[i].item || matches[i];
      html += '<a href="'+(item.permalink||'#')+'" class="block p-3 rounded-xl hover:bg-black/5 dark:hover:bg-white/10 transition-colors">'
            + '<div class="font-semibold text-accent">'+(item.title||'')+'</div>'
            + '<div class="text-sm text-page-muted mt-1 line-clamp-2">'+(item.summary||'')+'</div>'
            + '</a>';
    }
    resultsEl.innerHTML = html;
  }

  if (input) {
    // 加载 Fuse.js
    var fuseScript = document.createElement('script');
    fuseScript.src = 'https://cdn.bootcdn.net/ajax/libs/fuse.js/7.0.0/fuse.min.js';
    fuseScript.onload = function(){ loadIndex(); };
    document.head.appendChild(fuseScript);

    input.addEventListener('input', function(){
      clearTimeout(input._timer);
      input._timer = setTimeout(function(){ doSearch(input.value.trim()); }, 200);
    });
    input.addEventListener('focus', function(){ loadIndex(); });
  }
})();
</script>
